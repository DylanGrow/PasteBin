<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CodexBin - Secure, Zero-Knowledge Encrypted Pastebin</title>
  <meta name="description" content="CodexBin is a secure, zero-knowledge, client-side encrypted pastebin. Create, share, password-protect, and discuss encrypted pastes with complete privacy and speed." />
  <meta name="robots" content="index, follow" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; img-src 'self' data:; font-src 'self' data:; connect-src 'self' *; frame-ancestors 'none';" />
  <meta name="theme-color" content="#a855f7" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🔐%3C/text%3E%3C/svg%3E" />
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.11.1/styles/github-dark.min.css" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body data-bs-theme="dark">
  <header class="border-bottom bg-body-tertiary">
    <nav class="container navbar navbar-expand-lg">
      <div class="d-flex w-100 justify-content-between align-items-center gap-3">
        <a class="navbar-brand fw-bold d-flex align-items-center gap-2" href="./">
          <svg width="22" height="22" fill="currentColor" class="text-primary animate-pulse" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M12 2a5 5 0 0 0-5 5v3H6a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8a2 2 0 0 0-2-2h-1V7a5 5 0 0 0-5-5zm-3 5a3 3 0 0 1 6 0v3H9V7zm3 9a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3z"/>
          </svg>
          <h1 class="fs-4 m-0 fw-bold" style="background: linear-gradient(45deg, #a855f7, #06b6d4); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">CodexBin</h1>
        </a>
        <div class="d-flex flex-wrap align-items-center gap-2">
          <button id="newBtn" class="btn btn-sm btn-outline-secondary" type="button">New</button>
          <button id="cloneBtn" class="btn btn-sm btn-outline-secondary" type="button" disabled>Clone</button>
          <button id="themeToggle" class="btn btn-sm btn-outline-secondary d-flex align-items-center justify-content-center" type="button" aria-label="Toggle theme" style="width: 32px; height: 32px; padding: 0;">
            <!-- Moon Icon (Dark Mode Active) -->
            <svg id="themeMoonIcon" class="d-none" xmlns="http://www.w3.org/2000/svg" width="15" height="15" fill="currentColor" viewBox="0 0 16 16">
              <path d="M6 .278a.77.77 0 0 1 .08.858 7.2 7.2 0 0 0-.878 3.46c0 4.021 3.278 7.277 7.318 7.277c.792-.001 1.533-.16a.79.79 0 0 1 .81.316a.73.73 0 0 1-.031.893A8.35 8.35 0 0 1 8.344 16C3.734 16 0 12.286 0 7.71 0 4.266 2.114 1.312 5.124.06a.75.75 0 0 1 .876.218z"/>
            </svg>
            <!-- Sun Icon (Light Mode Active) -->
            <svg id="themeSunIcon" class="d-none" xmlns="http://www.w3.org/2000/svg" width="15" height="15" fill="currentColor" viewBox="0 0 16 16">
              <path d="M8 12a4 4 0 1 0 0-8 4 4 0 0 0 0 8M8 0a.5.5 0 0 1 .5.5v2a.5.5 0 0 1-1 0v-2A.5.5 0 0 1 8 0m0 13a.5.5 0 0 1 .5.5v2a.5.5 0 0 1-1 0v-2A.5.5 0 0 1 8 13m8-5a.5.5 0 0 1-.5.5h-2a.5.5 0 0 1 0-1h2a.5.5 0 0 1 .5.5M3 8a.5.5 0 0 1-.5.5h-2a.5.5 0 0 1 0-1h2a.5.5 0 0 1 .5.5m10.657-5.657a.5.5 0 0 1 0 .707l-1.414 1.415a.5.5 0 1 1-.707-.708l1.414-1.414a.5.5 0 0 1 .707 0m-9.193 9.193a.5.5 0 0 1 0 .707L3.05 13.657a.5.5 0 0 1-.707-.707l1.414-1.414a.5.5 0 0 1 .707 0m9.193 2.121a.5.5 0 0 1-.707 0l-1.414-1.414a.5.5 0 0 1 .707-.707l1.414 1.414a.5.5 0 0 1 0 .707M4.464 4.465a.5.5 0 0 1-.707 0L2.343 3.05a.5.5 0 1 1 .707-.707l1.414 1.414a.5.5 0 0 1 0 .708"/>
            </svg>
          </button>
        </div>
      </div>
    </nav>
  </header>

  <main class="container py-4">
    <div id="alertHost" class="mb-3"></div>

    <section class="card shadow-sm mb-4">
      <div class="card-header d-flex justify-content-between align-items-center">
        <span>Create Encrypted Paste</span>
      </div>
      <div class="card-body">
        <div class="mb-3">
          <label for="pasteText" class="form-label">Paste content</label>
          <textarea id="pasteText" class="form-control font-monospace" rows="14" placeholder="Type or paste your content here..."></textarea>
        </div>

        <div class="row g-3">
          <div class="col-md-4">
            <label for="expiration" class="form-label">Expiration</label>
            <select id="expiration" class="form-select">
              <option value="5min">5 minutes</option>
              <option value="1hr">1 hour</option>
              <option value="1day" selected>1 day</option>
              <option value="1week">1 week</option>
              <option value="never">Never</option>
            </select>
          </div>
          <div class="col-md-4">
            <label for="formatter" class="form-label">Formatter</label>
            <select id="formatter" class="form-select">
              <option value="plain" selected>Plain text</option>
              <option value="code">Source code</option>
              <option value="markdown">Markdown</option>
            </select>
          </div>
          <div class="col-md-4">
            <label for="password" class="form-label">Password (optional)</label>
            <input id="password" type="password" class="form-control" placeholder="Extra decryption password" />
          </div>
        </div>

        <div class="row g-3 mt-1">
          <div class="col-md-6">
            <label for="attachment" class="form-label">File attachment (optional)</label>
            <input id="attachment" class="form-control" type="file" />
          </div>
          <div class="col-md-6">
            <label for="apiBase" class="form-label">Worker API base URL</label>
            <input id="apiBase" class="form-control" type="url" placeholder="https://your-worker.your-subdomain.workers.dev" />
          </div>
        </div>

        <div class="d-flex flex-wrap gap-4 mt-3">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="burnAfterReading" />
            <label class="form-check-label" for="burnAfterReading">Burn after reading</label>
          </div>
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="openDiscussion" checked />
            <label class="form-check-label" for="openDiscussion">Open discussion</label>
          </div>
        </div>

        <div class="d-flex justify-content-end mt-4">
          <button id="createBtn" class="btn btn-primary" type="button">
            <span class="spinner-border spinner-border-sm d-none" id="createSpinner" aria-hidden="true"></span>
            Create paste
          </button>
        </div>
      </div>
    </section>

    <section id="pasteViewSection" class="card shadow-sm d-none">
      <div class="card-header d-flex justify-content-between align-items-center">
        <span>Decrypted Paste</span>
        <div class="small text-body-secondary" id="pasteMeta"></div>
      </div>
      <div class="card-body">
        <div id="pasteRender" class="paste-render mb-3"></div>

        <div id="attachmentView" class="d-none mb-3">
          <strong class="d-block mb-1">Attachment</strong>
          <a id="attachmentLink" class="btn btn-sm btn-outline-secondary" download>Download attachment</a>
        </div>

        <div class="d-flex flex-wrap gap-2 mb-2">
          <button id="copyLinkBtn" class="btn btn-outline-secondary btn-sm" type="button">Copy link</button>
          <button id="qrBtn" class="btn btn-outline-secondary btn-sm" type="button" data-bs-toggle="modal" data-bs-target="#qrModal">QR code</button>
          <button id="deleteBtn" class="btn btn-outline-danger btn-sm" type="button">Delete paste</button>
        </div>
      </div>
    </section>

    <section id="commentsSection" class="card shadow-sm mt-4 d-none">
      <div class="card-header">Discussion</div>
      <div class="card-body">
        <div id="commentsList" class="d-flex flex-column gap-3 mb-3"></div>
        <div class="mb-2">
          <label for="newComment" class="form-label">Add encrypted comment</label>
          <textarea id="newComment" rows="4" class="form-control" placeholder="Write a comment..."></textarea>
        </div>
        <button id="addCommentBtn" class="btn btn-sm btn-primary" type="button">Add comment</button>
      </div>
    </section>
  </main>

  <div class="modal fade" id="qrModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h1 class="modal-title fs-5">Share link QR code</h1>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body text-center">
          <div id="qrHost" class="d-inline-block p-3 bg-white rounded"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.5/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.11.1/lib/highlight.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <script src="js/app.js" defer></script>
</body>
</html>
